# Local dev stack: single-node KRaft Kafka + the collector + Prometheus.
# Bring up: docker compose up --build
#
# Tail ticks:
#   docker compose exec kafka kafka-console-consumer.sh \
#     --bootstrap-server localhost:9092 --topic market.ticks --from-beginning
#
# Open Prometheus: http://localhost:9090
# Collector metrics (raw): http://localhost:9100/metrics

services:
  kafka:
    image: apache/kafka:4.0.2
    container_name: mdc-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  collector:
    build: .
    container_name: mdc-collector
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9100:9100"
    environment:
      MDC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MDC_KAFKA_TOPIC: market.ticks
      MDC_BINANCE_SYMBOLS: btcusdt,ethusdt
      MDC_COINBASE_SYMBOLS: BTC-USD,ETH-USD
      MDC_KRAKEN_SYMBOLS: XBT/USD,ETH/USD
      MDC_METRICS_PORT: "9100"
      MDC_LOG_LEVEL: INFO
    restart: unless-stopped

  # Prometheus is opt-in (some Docker Desktop setups disallow bind-mounting from
  # ~/Desktop). Bring it up with:  docker compose --profile observability up
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: mdc-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - collector
    restart: unless-stopped
